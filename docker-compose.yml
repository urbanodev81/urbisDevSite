# UrbisDev — Landing Page (Laravel 12)

services:
  app:
    build: .
    container_name: urbisdev-site
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-smtp.zoho.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_USERNAME: ${MAIL_USERNAME:-contato@urbisdev.tech}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-contato@urbisdev.tech}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-UrbisDev}

  nginx:
    image: nginx:alpine
    container_name: urbisdev-site-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8100}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./src/public:/var/www/html/public:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/nginx/certs:ro
    depends_on:
      - app

  mailpit:
    image: axllent/mailpit:latest
    container_name: urbisdev-site-mailpit
    restart: unless-stopped
    profiles: [dev]
    ports:
      - "127.0.0.1:8027:8025"
      - "127.0.0.1:1027:1025"
