# Desenvolvimento local — sobrepõe docker-compose.yml
# Carregado automaticamente pelo docker compose

services:
  app:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

  nginx:
    ports:
      - "${NGINX_PORT:-8099}:80"
    # Substitui a lista do compose base: HTTP puro, sem o volume de certificados.
    volumes:
      - ./src/public:/var/www/html/public:ro
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro

  mailpit:
    profiles: []
